services:
  walks-mysql:
    image: mysql:8.0
    container_name: walks-mysql
    restart: unless-stopped
    env_file:
      - ../.env
      - mysql.env
    volumes:
      - walks-mysql-data:/var/lib/mysql
      - ../backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - walks-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  walks-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: walks-api
    restart: unless-stopped
    env_file:
      - ../.env
    networks:
      - walks-network
    depends_on:
      walks-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  walks-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: walks-frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    networks:
      - walks-network
      - npm_network
    depends_on:
      walks-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  walks-mysql-data:

networks:
  walks-network:
    driver: bridge
  npm_network:
    external: true
